<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KE:SAI - Kyutai ELLIS Scalable Autonomous Intelligence</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background-color: #000000; /* Pure Black */
            display: flex; 
            flex-direction: column; /* Stacks logo and text vertically */
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
            /* Modern, clean system fonts */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .logo {
            display: block;
            height: auto;
            width: 50%; /* 50% width on desktop */
            margin-bottom: 30px; /* Space between logo and text */
        }

        .tagline {
            color: #aaaaaa; /* Clean light grey */
            font-weight: 300;
            font-size: 2rem;
            letter-spacing: 0.2rem; /* Spacious, modern feel */
            text-transform: uppercase;
            text-align: center;
            max-width: 90%;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .logo {
                width: 80%; /* 80% width on mobile */
            }
            .tagline {
                font-size: 0.85rem;
                letter-spacing: 0.1rem;
            }
        }
    </style>
</head>
<body>

    <img src="kesai.png" alt="KE:SAI Logo" class="logo">

    <div class="tagline">
        Kyutai ELLIS Scalable Autonomous Intelligence
    </div>

</body>
</html>
